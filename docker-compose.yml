version: "3.9"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: uptime-monitor-postgres
    environment:
      POSTGRES_DB: uptime_monitor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/migrations:/docker-entrypoint-initdb.d
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    networks:
      - uptime-monitor
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d uptime_monitor"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Redis/Valkey Cache and Job Queue
  redis:
    image: valkey/valkey:7-alpine
    container_name: uptime-monitor-redis
    command: valkey-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6380}:6379"
    networks:
      - uptime-monitor
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # Uptime Monitor Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uptime-monitor-app
    environment:
      # Server configuration
      PORT: ${PORT:-8080}

      # Database configuration (will be read from config.yaml)
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}

      # Worker configuration
      WORKER_POOL_SIZE: ${WORKER_POOL_SIZE:-8}

      # Logging configuration
      LOG_LEVEL: ${LOG_LEVEL:-info}

      # Alert configuration (only set these if you want to enable alerts)
      # TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      # TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      # SMTP_HOST: ${SMTP_HOST:-}
      # SMTP_PORT: ${SMTP_PORT:-587}
      # SMTP_USERNAME: ${SMTP_USERNAME:-}
      # SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      # SMTP_FROM_ADDRESS: ${SMTP_FROM_ADDRESS:-}
      # WEBHOOK_URL: ${WEBHOOK_URL:-}
    ports:
      - "${PORT:-8080}:8080"
    networks:
      - uptime-monitor
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/main", "-health-check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  uptime-monitor:
    driver: bridge
