name: CI/CD Pipeline

# Tên run sẽ hiển thị động (ví dụ: Deploy sha-abc1234)
run-name: ${{ github.event_name == 'push' && format('Deploy {0}', github.sha) || 'CI Test' }}

on:
  push:
    branches:
      - main

# Ngăn chạy song song nhiều job khi push liên tục (chỉ giữ job mới nhất)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read          # Chỉ cần đọc code
  packages: write         # Để push image lên Docker Hub (nếu dùng ghcr.io thì packages:write)

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      redis:
        image: valkey/valkey:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'      # Hardcode version ổn định (thay đổi nếu dự án cần version khác)
          cache: true

      # Thêm lint/test thực tế ở đây (bạn có thể bổ sung sau)
      - name: Install dependencies
        run: go mod download   # Nếu có go.mod, nếu không thì bỏ hoặc thay bằng lệnh khác

      - name: Run tests
        run: go test ./... -v  # Thay bằng lệnh test thật của bạn

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: lint-and-test

    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract metadata (tags, labels)
        id: vars
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "image_tag=sha-$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker images
        uses: docker/build-push-action@v6   # Nâng lên v6 mới nhất (2026)
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/webtracker:latest
            ${{ secrets.DOCKER_USERNAME }}/webtracker:${{ steps.vars.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3   # Pin version cụ thể để tránh breaking changes
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT || '22' }}
          script_stop: true
          envs: IMAGE_TAG
          env:
            IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}

          script: |
            set -euo pipefail   # Dừng ngay nếu có lỗi

            cd /home/webtracker || { echo "Directory /home/webtracker not found"; exit 1; }

            echo "Pulling latest images..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull

            echo "Starting services..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans

            echo "Waiting for health check (max 60s)..."
            for i in {1..12}; do
              if curl -f -s http://localhost:8080/health > /dev/null; then
                echo "Health check passed!"
                break
              fi
              echo "Attempt $i/12: Health check failed, waiting 5s..."
              sleep 5
            done

            if ! curl -f -s http://localhost:8080/health > /dev/null; then
              echo "Health check failed after retries!"
              docker compose logs --tail 50
              exit 1
            fi

            echo "Deployment successful!"
            echo "Deployed image tag: $IMAGE_TAG"