name: CI/CD Deploy

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: valkey/valkey:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...
        env:
          REDIS_ADDR: 127.0.0.1:6379

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "image_tag=sha-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/webtracker:latest
            ${{ secrets.DOCKER_USERNAME }}/webtracker:${{ steps.vars.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          script_stop: true # Dừng ngay nếu có lệnh lỗi
          envs: DOCKER_USERNAME,IMAGE_TAG
          script: |
            export DOCKER_USERNAME="${{ secrets.DOCKER_USERNAME }}"
            export IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"

            echo ">>> [INFO] Deploying image: $DOCKER_USERNAME/webtracker:$IMAGE_TAG"

            cd /home/webtracker || { echo ">>> [ERROR] Directory /home/webtracker not found"; exit 1; }

            # 1. Kiểm tra môi trường
            if [ ! -f docker-compose.yml ]; then
              echo ">>> [ERROR] docker-compose.yml not found in $(pwd)"
              exit 1
            fi

            # 2. Cập nhật image mới
            echo ">>> [INFO] Pulling latest images..."
            docker compose pull app || echo ">>> [WARN] Pull failed, trying to build locally if needed"

            # 3. Khởi động lại service
            echo ">>> [INFO] Starting containers..."
            # Dùng --remove-orphans để dọn các container cũ không còn trong file config
            docker compose up -d --remove-orphans || { 
              echo ">>> [ERROR] Docker compose up failed. Checking logs...";
              docker compose logs --tail 20; 
              exit 1; 
            }

            # 4. Kiểm tra sức khỏe (Healthcheck)
            echo ">>> [INFO] Waiting for app to be ready..."
            ATTEMPTS=0
            MAX_ATTEMPTS=10
            
            # Lấy tên service thay vì tên container cứng nhắc (tránh lỗi not found)
            SERVICE_NAME="app" 
            
            until [ $ATTEMPTS -ge $MAX_ATTEMPTS ]; do
              # Kiểm tra xem có container nào đang chạy của service này không
              CONTAINER_ID=$(docker compose ps -q $SERVICE_NAME)
              
              if [ -z "$CONTAINER_ID" ]; then
                echo ">>> [ERROR] Service $SERVICE_NAME is not running."
                docker compose logs $SERVICE_NAME
                exit 1
              fi

              # Kiểm tra Health status
              HEALTH=$(docker inspect --format='{{.State.Health.Status}}' $CONTAINER_ID 2>/dev/null || echo "no-healthcheck")
              
              if [ "$HEALTH" == "healthy" ] || [ "$HEALTH" == "no-healthcheck" ]; then
                echo ">>> [SUCCESS] Service is up and status is: $HEALTH"
                break
              fi
              
              echo ">>> [WAIT] Status: $HEALTH (Attempt: $((ATTEMPTS+1))/$MAX_ATTEMPTS)"
              sleep 5
              ATTEMPTS=$((ATTEMPTS+1))
            done

            if [ $ATTEMPTS -eq $MAX_ATTEMPTS ]; then
               echo ">>> [ERROR] Health check timed out!"
               docker compose logs $SERVICE_NAME
               exit 1
            fi

            # 5. Dọn dẹp
            docker image prune -f
            echo ">>> [FINISH] Deployment successful!"