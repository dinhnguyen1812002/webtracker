name: CI/CD Deploy

on:
  push:
    branches:
      - main

jobs:

  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: valkey/valkey:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: |
          go test ./...
        env:
          REDIS_ADDR: 127.0.0.1:6379

  build-and-deploy:

    runs-on: ubuntu-latest
    needs: test

    steps:

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/webtracker:latest .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/webtracker:latest

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script_stop: true   # ← dừng ngay nếu có lệnh lỗi
          script: |
            echo ">>> Step 1: cd /app"
            cd /app

            echo ">>> Step 2: Pull image"
            docker compose pull

            echo ">>> Step 3: Up containers"
            docker compose up -d

            echo ">>> Step 4: Running containers"
            docker ps

            echo ">>> Step 5: Prune"
            docker image prune -f

            echo ">>> DONE"
