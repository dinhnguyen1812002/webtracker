name: CI/CD Deploy

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: valkey/valkey:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...
        env:
          REDIS_ADDR: 127.0.0.1:6379

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "image_tag=sha-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/webtracker:latest
            ${{ secrets.DOCKER_USERNAME }}/webtracker:${{ steps.vars.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          script_stop: true
          envs: DOCKER_USERNAME,IMAGE_TAG
          script: |
            export DOCKER_USERNAME="${{ secrets.DOCKER_USERNAME }}"
            export IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"

            echo ">>> Deploying: $DOCKER_USERNAME/webtracker:$IMAGE_TAG"

            cd /home/dev/app || { echo "FAIL: directory not found"; exit 1; }

            # Đảm bảo .env tồn tại
            [ -f .env ] || { echo "FAIL: .env file not found"; exit 1; }

            # Lưu tag hiện tại để rollback nếu cần
            [ -f .current_tag ] && cp .current_tag .previous_tag
            echo "$IMAGE_TAG" > .current_tag

            # Pull image mới
            docker compose pull app || { echo "FAIL: docker compose pull"; exit 1; }

            # Khởi động lại chỉ app container (postgres & redis giữ nguyên)
            docker compose up -d --no-deps app || { echo "FAIL: docker compose up"; exit 1; }

            # Chờ container khởi động
            echo ">>> Waiting for app to start..."
            sleep 20

            # Kiểm tra health
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' uptime-monitor-app 2>/dev/null || echo "not_found")
            echo ">>> Health status: $STATUS"

            if [ "$STATUS" != "healthy" ]; then
              echo "FAIL: App not healthy (status=$STATUS)"
              echo ">>> Container logs:"
              docker logs uptime-monitor-app --tail 50
              
              # Rollback nếu có tag cũ
              if [ -f .previous_tag ]; then
                PREV_TAG=$(cat .previous_tag)
                echo ">>> Rolling back to $PREV_TAG..."
                IMAGE_TAG="$PREV_TAG" docker compose up -d --no-deps app
              fi
              
              exit 1
            fi

            echo ">>> All containers:"
            docker compose ps

            # Dọn image cũ
            docker image prune -f

            echo ">>> Deploy successful: $IMAGE_TAG"