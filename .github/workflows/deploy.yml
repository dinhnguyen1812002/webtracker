name: CI/CD Deploy

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: valkey/valkey:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...
        env:
          REDIS_ADDR: 127.0.0.1:6379

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "image_tag=sha-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/webtracker:latest
            ${{ secrets.DOCKER_USERNAME }}/webtracker:${{ steps.vars.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload compose files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          source: "docker-compose.yml,docker-compose.prod.yml"
          target: /home/webtracker

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          script_stop: true # Dừng ngay nếu có lệnh lỗi
          envs: DOCKER_USERNAME,IMAGE_TAG,APP_SERVICE_NAME
          script: |
            export DOCKER_USERNAME="${{ secrets.DOCKER_USERNAME }}"
            export IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"
            export APP_SERVICE_NAME="${{ vars.APP_SERVICE_NAME }}"

            echo ">>> [INFO] Deploying image: $DOCKER_USERNAME/webtracker:$IMAGE_TAG"

            cd /home/webtracker || { echo ">>> [ERROR] Directory /home/webtracker not found"; exit 1; }

            # 1. Xác định bộ file compose có trên server
            if [ -f docker-compose.yml ] && [ -f docker-compose.prod.yml ]; then
              COMPOSE_ARGS="-f docker-compose.yml -f docker-compose.prod.yml"
            elif [ -f docker-compose.prod.yml ]; then
              COMPOSE_ARGS="-f docker-compose.prod.yml"
            elif [ -f docker-compose.yml ]; then
              COMPOSE_ARGS="-f docker-compose.yml"
            else
              echo ">>> [ERROR] No docker compose file found in $(pwd)"
              exit 1
            fi

            echo ">>> [INFO] Using compose args: $COMPOSE_ARGS"

            SERVICE_NAME="${APP_SERVICE_NAME:-app}"

            if ! docker compose $COMPOSE_ARGS config --services | grep -qx "$SERVICE_NAME"; then
              echo ">>> [ERROR] Service $SERVICE_NAME not found in compose config"
              docker compose $COMPOSE_ARGS config --services
              exit 1
            fi

            echo ">>> [INFO] Detected app service: $SERVICE_NAME"

            # 2. Cập nhật image mới
            echo ">>> [INFO] Pulling latest images..."
            docker compose $COMPOSE_ARGS pull "$SERVICE_NAME" || echo ">>> [WARN] Pull failed, trying to continue with local image if available"

            # 3. Khởi động lại service
            echo ">>> [INFO] Starting containers..."
            # Dùng --remove-orphans để dọn các container cũ không còn trong file config
            docker compose $COMPOSE_ARGS up -d --remove-orphans || {
              echo ">>> [ERROR] Docker compose up failed. Checking logs...";
              docker compose $COMPOSE_ARGS logs --tail 20;
              exit 1;
            }

            # 5. Dọn dẹp
            docker image prune -f
            echo ">>> [FINISH] Deployment successful!"
