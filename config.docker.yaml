# Docker Configuration for Uptime Monitoring System
# This configuration is optimized for running in Docker Compose

server:
  port: 8080
  host: "0.0.0.0"
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 120s

database:
  host: "postgres"  # Docker Compose service name
  port: 5432
  database: "uptime_monitor"
  user: "postgres"
  password: "${POSTGRES_PASSWORD}"
  ssl_mode: "disable"
  max_connections: 15
  min_connections: 2
  connect_timeout: 10s
  max_conn_lifetime: 1h

redis:
  enabled: true
  addr: "redis:6379"  # Docker Compose service name
  password: ""
  db: 0
  pool_size: 5
  min_idle_conns: 1
  dial_timeout: 5s
  read_timeout: 3s
  write_timeout: 3s

# Alert channels are disabled by default
# Enable them by setting the appropriate environment variables
alert:
  telegram:
    enabled: false
    bot_token: "${TELEGRAM_BOT_TOKEN}"
    chat_id: "${TELEGRAM_CHAT_ID}"
  email:
    enabled: false
    smtp_host: "${SMTP_HOST}"
    smtp_port: 587
    username: "${SMTP_USERNAME}"
    password: "${SMTP_PASSWORD}"
    from_address: "${SMTP_FROM_ADDRESS}"
    from_name: "Uptime Monitor"
    use_tls: true
    use_starttls: true
  webhook:
    enabled: false
    url: "${WEBHOOK_URL}"
    timeout: 10s

worker:
  pool_size: 8
  queue_size: 500
  job_timeout: 60s
  idle_timeout: 5m

logging:
  level: "info"
  format: "json"
  output: "stdout"